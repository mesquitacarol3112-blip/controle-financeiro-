<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #f3e8ff;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  min-height: 100vh;
  padding: 15px;
}

h1 {
  text-align: center;
  color: purple;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: purple;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.filtro {
  display: flex;
  gap: 5px;
}

.filtro button {
  flex: 1;
  background: #ddd;
  color: black;
}

.card {
  background: #fafafa;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.resumo {
  margin-top: 10px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>💜 Finanças</h1>

<input type="text" id="nome" placeholder="Ex: Mercado">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
  <option value="entrada">Entrada</option>
  <option value="saida">Saída</option>
</select>

<select id="pagamento">
  <option>Débito</option>
  <option>Crédito</option>
  <option>Dinheiro</option>
</select>

<input type="month" id="mes">

<button onclick="adicionar()">Salvar</button>

<div class="filtro">
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrarMesAtual()">Mês Atual</button>
</div>

<div id="lista"></div>

<div class="resumo">
Entradas: R$ <span id="entradas">0</span><br>
Saídas: R$ <span id="saidas">0</span><br>
Saldo: R$ <span id="saldo">0</span>
</div>

<canvas id="grafico"></canvas>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCl73k3w5CO8X6Axr3K3eJRcKSuC-MZAFQ",
  authDomain: "controlefinanceiro-2480f.firebaseapp.com",
  databaseURL: "https://controlefinanceiro-2480f-default-rtdb.firebaseio.com",
  projectId: "controlefinanceiro-2480f",
  storageBucket: "controlefinanceiro-2480f.appspot.com",
  messagingSenderId: "526982146177",
  appId: "1:526982146177:web:a02a4e0d2d31c9816d8580"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let dados = [];
let filtroAtual = "todos";
let grafico;

// ADICIONAR
function adicionar() {
  const nome = document.getElementById("nome").value;
  const valor = parseFloat(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;
  const pagamento = document.getElementById("pagamento").value;
  const mes = document.getElementById("mes").value;

  if (!nome || !valor || !mes) {
    alert("Preencha tudo!");
    return;
  }

  db.ref("financas").push({ nome, valor, tipo, pagamento, mes });

  limpar();
}

// LIMPAR CAMPOS
function limpar() {
  document.getElementById("nome").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("mes").value = "";
}

// FILTRO
function filtrar(tipo) {
  filtroAtual = tipo;
  render();
}

// MÊS ATUAL CORRIGIDO (BR)
function filtrarMesAtual() {
  const hoje = new Date();
  const ano = hoje.getFullYear();
  const mes = String(hoje.getMonth() + 1).padStart(2, '0');

  filtroAtual = `${ano}-${mes}`;
  render();
}

// EXCLUIR
function excluir(id) {
  db.ref("financas/" + id).remove();
}

// EDITAR
function editar(id, item) {
  document.getElementById("nome").value = item.nome;
  document.getElementById("valor").value = item.valor;
  document.getElementById("tipo").value = item.tipo;
  document.getElementById("pagamento").value = item.pagamento;
  document.getElementById("mes").value = item.mes;

  excluir(id);
}

// TEMPO REAL
db.ref("financas").on("value", snap => {
  dados = [];
  snap.forEach(c => {
    dados.push({ id: c.key, ...c.val() });
  });
  render();
});

// RENDER
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let entradas = 0;
  let saidas = 0;

  dados
    .filter(item => filtroAtual === "todos" || item.mes === filtroAtual)
    .forEach(item => {

      if (item.tipo === "entrada") entradas += item.valor;
      else saidas += item.valor;

      lista.innerHTML += `
        <div class="card">
          <p><b>${item.nome}</b></p>
          <p>R$ ${item.valor.toFixed(2).replace(".", ",")}</p>
          <p>${item.tipo} | ${item.pagamento}</p>
          <p>${item.mes}</p>
          <button onclick='editar("${item.id}", ${JSON.stringify(item)})'>Editar</button>
          <button onclick='excluir("${item.id}")'>Excluir</button>
        </div>
      `;
    });

  document.getElementById("entradas").innerText = entradas.toFixed(2).replace(".", ",");
  document.getElementById("saidas").innerText = saidas.toFixed(2).replace(".", ",");
  document.getElementById("saldo").innerText = (entradas - saidas).toFixed(2).replace(".", ",");

  atualizarGrafico(entradas, saidas);
}

// GRÁFICO
function atualizarGrafico(entradas, saidas) {
  const ctx = document.getElementById("grafico");

  if (grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Entradas", "Saídas"],
      datasets: [{
        data: [entradas, saidas],
        backgroundColor: ["green", "red"]
      }]
    }
  });
}
</script>

</body>
</html>
