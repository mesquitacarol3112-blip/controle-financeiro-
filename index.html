<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Finanças 💜</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #1e1b2e;
  color: white;
  margin: 0;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
  color: #b388ff;
}

.card {
  background: #2a2550;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #7c4dff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 5px;
}

.item {
  background: #3a336f;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="app">
<h1>💜 Finanças</h1>

<div class="card">
<input type="text" id="nome" placeholder="Nome (Luz, Mercado)">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
</select>

<select id="pagamento">
<option>Débito</option>
<option>Crédito</option>
<option>Dinheiro</option>
</select>

<input type="month" id="mes">

<button id="btnSalvar">Salvar</button>
</div>

<div class="card">
<select id="filtroMes"></select>
</div>

<div class="card" id="lista"></div>

<div class="card">
Entradas: <span id="entradas">R$ 0</span><br>
Saídas: <span id="saidas">R$ 0</span><br>
Saldo: <span id="saldo">R$ 0</span>
</div>

<canvas id="grafico"></canvas>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCl73k3w5CO8X6Axr3K3eJRcKSuC-MZAFQ",
  authDomain: "controlefinanceiro-2480f.firebaseapp.com",
  projectId: "controlefinanceiro-2480f",
  storageBucket: "controlefinanceiro-2480f.firebasestorage.app",
  messagingSenderId: "526982146177",
  appId: "1:526982146177:web:a02a4e0d2d31c9816d8580"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// PEGAR ELEMENTOS
const nomeInput = document.getElementById("nome");
const valorInput = document.getElementById("valor");
const tipoInput = document.getElementById("tipo");
const pagamentoInput = document.getElementById("pagamento");
const mesInput = document.getElementById("mes");

const lista = document.getElementById("lista");
const filtroMes = document.getElementById("filtroMes");

const entradasSpan = document.getElementById("entradas");
const saidasSpan = document.getElementById("saidas");
const saldoSpan = document.getElementById("saldo");

const btnSalvar = document.getElementById("btnSalvar");

let dados = [];
let grafico;

// FORMATAR BR
function formatar(valor) {
  return valor.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

// SALVAR
btnSalvar.addEventListener("click", async () => {
  const nome = nomeInput.value;
  const valor = parseFloat(valorInput.value);
  const tipo = tipoInput.value;
  const pagamento = pagamentoInput.value;
  const mes = mesInput.value;

  if (!nome || !valor || !mes) {
    alert("Preencha tudo!");
    return;
  }

  await addDoc(collection(db, "movimentacoes"), {
    nome, valor, tipo, pagamento, mes
  });

  limpar();
  carregar();
});

// LIMPAR
function limpar() {
  nomeInput.value = "";
  valorInput.value = "";
  tipoInput.value = "entrada";
  pagamentoInput.value = "Débito";
  mesInput.value = "";
}

// CARREGAR
async function carregar() {
  const querySnapshot = await getDocs(collection(db, "movimentacoes"));

  dados = [];
  querySnapshot.forEach((docSnap) => {
    dados.push({ id: docSnap.id, ...docSnap.data() });
  });

  atualizarFiltro();
  render();
}

// EXCLUIR
window.excluir = async function(id) {
  await deleteDoc(doc(db, "movimentacoes", id));
  carregar();
}

// EDITAR
window.editar = function(id) {
  const item = dados.find(d => d.id === id);

  nomeInput.value = item.nome;
  valorInput.value = item.valor;
  tipoInput.value = item.tipo;
  pagamentoInput.value = item.pagamento;
  mesInput.value = item.mes;

  excluir(id);
}

// FILTRO
function atualizarFiltro() {
  const meses = [...new Set(dados.map(d => d.mes))];

  filtroMes.innerHTML = '<option value="">Todos os meses</option>';

  meses.forEach(m => {
    filtroMes.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

filtroMes.addEventListener("change", render);

// RENDER
function render() {
  lista.innerHTML = "";

  let entradas = 0;
  let saidas = 0;

  const filtro = filtroMes.value;

  dados
    .filter(d => !filtro || d.mes === filtro)
    .forEach(item => {

      if (item.tipo === "entrada") entradas += item.valor;
      else saidas += item.valor;

      lista.innerHTML += `
        <div class="item">
          <b>${item.nome}</b> - ${formatar(item.valor)}<br>
          ${item.tipo} | ${item.pagamento} | ${item.mes}<br>
          <button onclick="editar('${item.id}')">Editar</button>
          <button onclick="excluir('${item.id}')">Excluir</button>
        </div>
      `;
    });

  entradasSpan.innerText = formatar(entradas);
  saidasSpan.innerText = formatar(saidas);
  saldoSpan.innerText = formatar(entradas - saidas);

  atualizarGrafico(entradas, saidas);
}

// GRÁFICO
function atualizarGrafico(entradas, saidas) {
  const ctx = document.getElementById("grafico");

  if (grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Entradas", "Saídas"],
      datasets: [{
        data: [entradas, saidas],
        backgroundColor: ["#00e676", "#ff5252"]
      }]
    }
  });
}

// INICIAR
carregar();
</script>

</body>
</html>
