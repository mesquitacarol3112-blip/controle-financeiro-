<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE COMPAT (IMPORTANTE) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #f3e8ff;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h1 {
  text-align: center;
  color: purple;
}

input, select, button {
  padding: 8px;
  margin: 5px;
}

button {
  background: purple;
  color: white;
  border: none;
  border-radius: 5px;
}

table {
  width: 100%;
  margin-top: 15px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

.resumo {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>💜 Controle Financeiro</h1>

<input type="text" id="nome" placeholder="Ex: Luz, Mercado">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
  <option value="entrada">Entrada</option>
  <option value="saida">Saída</option>
</select>

<select id="pagamento">
  <option>Débito</option>
  <option>Crédito</option>
  <option>Dinheiro</option>
</select>

<input type="month" id="mes">

<button onclick="adicionar()">Salvar</button>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Valor</th>
<th>Tipo</th>
<th>Pagamento</th>
<th>Mês</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<div class="resumo">
Entradas: R$ <span id="entradas">0</span> |
Saídas: R$ <span id="saidas">0</span> |
Saldo: R$ <span id="saldo">0</span>
</div>

<canvas id="grafico"></canvas>

</div>

<script>
// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCl73k3w5CO8X6Axr3K3eJRcKSuC-MZAFQ",
  authDomain: "controlefinanceiro-2480f.firebaseapp.com",
  databaseURL: "https://controlefinanceiro-2480f-default-rtdb.firebaseio.com",
  projectId: "controlefinanceiro-2480f",
  storageBucket: "controlefinanceiro-2480f.appspot.com",
  messagingSenderId: "526982146177",
  appId: "1:526982146177:web:a02a4e0d2d31c9816d8580"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let dados = [];
let grafico;

// 🔥 ADICIONAR
function adicionar() {
  const nome = document.getElementById("nome").value;
  const valor = parseFloat(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;
  const pagamento = document.getElementById("pagamento").value;
  const mes = document.getElementById("mes").value;

  if (!nome || !valor || !mes) {
    alert("Preencha tudo!");
    return;
  }

  const novo = { nome, valor, tipo, pagamento, mes };

  db.ref("financas").push(novo);

  limparCampos();
}

// 🔥 LIMPAR CAMPOS
function limparCampos() {
  document.getElementById("nome").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("mes").value = "";
}

// 🔥 EXCLUIR
function excluir(id) {
  db.ref("financas/" + id).remove();
}

// 🔥 EDITAR
function editar(id, item) {
  document.getElementById("nome").value = item.nome;
  document.getElementById("valor").value = item.valor;
  document.getElementById("tipo").value = item.tipo;
  document.getElementById("pagamento").value = item.pagamento;
  document.getElementById("mes").value = item.mes;

  excluir(id);
}

// 🔥 CARREGAR DADOS EM TEMPO REAL
db.ref("financas").on("value", snapshot => {
  dados = [];

  snapshot.forEach(child => {
    dados.push({
      id: child.key,
      ...child.val()
    });
  });

  render();
});

// 🔥 RENDER
function render() {
  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  let entradas = 0;
  let saidas = 0;

  dados.forEach(item => {
    const tr = document.createElement("tr");

    if (item.tipo === "entrada") {
      entradas += item.valor;
    } else {
      saidas += item.valor;
    }

    tr.innerHTML = `
      <td>${item.nome}</td>
      <td>R$ ${item.valor.toFixed(2).replace(".", ",")}</td>
      <td>${item.tipo}</td>
      <td>${item.pagamento}</td>
      <td>${item.mes}</td>
      <td>
        <button onclick='editar("${item.id}", ${JSON.stringify(item)})'>Editar</button>
        <button onclick='excluir("${item.id}")'>Excluir</button>
      </td>
    `;

    tabela.appendChild(tr);
  });

  document.getElementById("entradas").innerText = entradas.toFixed(2).replace(".", ",");
  document.getElementById("saidas").innerText = saidas.toFixed(2).replace(".", ",");
  document.getElementById("saldo").innerText = (entradas - saidas).toFixed(2).replace(".", ",");

  atualizarGrafico(entradas, saidas);
}

// 🔥 GRÁFICO
function atualizarGrafico(entradas, saidas) {
  const ctx = document.getElementById("grafico");

  if (grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Entradas", "Saídas"],
      datasets: [{
        data: [entradas, saidas],
        backgroundColor: ["green", "red"]
      }]
    }
  });
}
</script>

</body>
</html>
