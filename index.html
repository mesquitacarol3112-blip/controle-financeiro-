<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Finanças 💜</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #1e1b2e;
  color: white;
  margin: 0;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
  color: #b388ff;
}

.card {
  background: #2a2550;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #7c4dff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.item {
  background: #3a336f;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}
</style>
</head>

<body>

<div class="app">
<h1>💜 Finanças</h1>

<div class="card">
<input type="text" id="nome" placeholder="Nome (Luz, Mercado)">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
<option value="entrada">Entrada</option>
<option value="saida">Saída</option>
</select>

<select id="pagamento">
<option>Débito</option>
<option>Crédito</option>
<option>Dinheiro</option>
</select>

<input type="month" id="mes">

<button onclick="adicionar()">Salvar</button>
</div>

<div class="card">
<select id="filtroMes" onchange="render()">
<option value="">Todos os meses</option>
</select>
</div>

<div class="card" id="lista"></div>

<div class="card">
Entradas: <span id="entradas">R$ 0</span><br>
Saídas: <span id="saidas">R$ 0</span><br>
Saldo: <span id="saldo">R$ 0</span>
</div>

<canvas id="grafico"></canvas>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];
let grafico;

// FORMATAR BR
function formatar(valor) {
  return valor.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });
}

// ADICIONAR
function adicionar() {
  const nome = document.getElementById("nome").value;
  const valor = parseFloat(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;
  const pagamento = document.getElementById("pagamento").value;
  const mes = document.getElementById("mes").value;

  if (!nome || !valor || !mes) {
    alert("Preencha tudo!");
    return;
  }

  dados.push({ nome, valor, tipo, pagamento, mes });

  salvar();
  limpar();
  atualizarFiltro();
  render();
}

// LIMPAR CAMPOS
function limpar() {
  document.getElementById("nome").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("tipo").value = "entrada";
  document.getElementById("pagamento").value = "Débito";
  document.getElementById("mes").value = "";
}

// SALVAR
function salvar() {
  localStorage.setItem("dados", JSON.stringify(dados));
}

// EXCLUIR
function excluir(index) {
  dados.splice(index, 1);
  salvar();
  atualizarFiltro();
  render();
}

// EDITAR
function editar(index) {
  const item = dados[index];

  document.getElementById("nome").value = item.nome;
  document.getElementById("valor").value = item.valor;
  document.getElementById("tipo").value = item.tipo;
  document.getElementById("pagamento").value = item.pagamento;
  document.getElementById("mes").value = item.mes;

  excluir(index);
}

// FILTRO DE MÊS
function atualizarFiltro() {
  const filtro = document.getElementById("filtroMes");
  const meses = [...new Set(dados.map(d => d.mes))];

  filtro.innerHTML = '<option value="">Todos os meses</option>';

  meses.forEach(m => {
    filtro.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

// RENDER
function render() {
  const lista = document.getElementById("lista");
  const filtro = document.getElementById("filtroMes").value;

  lista.innerHTML = "";

  let entradas = 0;
  let saidas = 0;

  dados
    .filter(d => !filtro || d.mes === filtro)
    .forEach((item, index) => {

      if (item.tipo === "entrada") entradas += item.valor;
      else saidas += item.valor;

      lista.innerHTML += `
        <div class="item">
          <b>${item.nome}</b> - ${formatar(item.valor)}<br>
          ${item.tipo} | ${item.pagamento} | ${item.mes}<br>
          <button onclick="editar(${index})">Editar</button>
          <button onclick="excluir(${index})">Excluir</button>
        </div>
      `;
    });

  document.getElementById("entradas").innerText = formatar(entradas);
  document.getElementById("saidas").innerText = formatar(saidas);
  document.getElementById("saldo").innerText = formatar(entradas - saidas);

  atualizarGrafico(entradas, saidas);
}

// GRÁFICO
function atualizarGrafico(entradas, saidas) {
  const ctx = document.getElementById("grafico");

  if (grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Entradas", "Saídas"],
      datasets: [{
        data: [entradas, saidas],
        backgroundColor: ["#00e676", "#ff5252"]
      }]
    }
  });
}

// INICIAR
atualizarFiltro();
render();
</script>

</body>
</html>
