<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body {
  font-family: Arial;
  background: #f3e8ff;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  background: white;
  min-height: 100vh;
  padding: 15px;
}

h1 {
  text-align: center;
  color: purple;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: purple;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

#meses {
  display: flex;
  overflow-x: auto;
  gap: 5px;
  margin: 10px 0;
}

.mes-btn {
  padding: 8px 12px;
  background: #ddd;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
}

.mes-btn.ativo {
  background: purple;
  color: white;
}

.card {
  background: #fafafa;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.resumo {
  margin-top: 10px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>💜 Finanças</h1>

<input type="text" id="nome" placeholder="Ex: Mercado">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
  <option value="entrada">Entrada</option>
  <option value="saida">Saída</option>
</select>

<select id="pagamento">
  <option>Débito</option>
  <option>Crédito</option>
  <option>Dinheiro</option>
</select>

<input type="month" id="mes">

<button onclick="adicionar()">Salvar</button>

<!-- GAVETA DE MESES -->
<div id="meses"></div>

<div id="lista"></div>

<div class="resumo">
Entradas: R$ <span id="entradas">0</span><br>
Saídas: R$ <span id="saidas">0</span><br>
Saldo: R$ <span id="saldo">0</span>
</div>

<canvas id="grafico"></canvas>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCl73k3w5CO8X6Axr3K3eJRcKSuC-MZAFQ",
  authDomain: "controlefinanceiro-2480f.firebaseapp.com",
  databaseURL: "https://controlefinanceiro-2480f-default-rtdb.firebaseio.com",
  projectId: "controlefinanceiro-2480f",
  storageBucket: "controlefinanceiro-2480f.appspot.com",
  messagingSenderId: "526982146177",
  appId: "1:526982146177:web:a02a4e0d2d31c9816d8580"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let dados = [];
let filtroAtual = null;
let grafico;

// FORMATAR MÊS BR
function formatarMesBR(mes) {
  const [ano, m] = mes.split("-");
  const meses = [
    "Janeiro","Fevereiro","Março","Abril","Maio","Junho",
    "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
  ];
  return `${meses[parseInt(m)-1]}/${ano}`;
}

// ADICIONAR
function adicionar() {
  const nome = document.getElementById("nome").value;
  const valor = parseFloat(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;
  const pagamento = document.getElementById("pagamento").value;
  const mes = document.getElementById("mes").value;

  if (!nome || !valor || !mes) {
    alert("Preencha tudo!");
    return;
  }

  db.ref("financas").push({ nome, valor, tipo, pagamento, mes });

  limpar();
}

// LIMPAR
function limpar() {
  document.getElementById("nome").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("mes").value = "";
}

// EXCLUIR
function excluir(id) {
  db.ref("financas/" + id).remove();
}

// EDITAR
function editar(id, item) {
  nome.value = item.nome;
  valor.value = item.valor;
  tipo.value = item.tipo;
  pagamento.value = item.pagamento;
  mes.value = item.mes;

  excluir(id);
}

// CARREGAR DADOS
db.ref("financas").on("value", snap => {
  dados = [];
  snap.forEach(c => {
    dados.push({ id: c.key, ...c.val() });
  });

  if (dados.length > 0 && !filtroAtual) {
    const meses = [...new Set(dados.map(d => d.mes))].sort().reverse();
    filtroAtual = meses[0];
  }

  render();
});

// RENDER MESES
function renderMeses() {
  const container = document.getElementById("meses");
  container.innerHTML = "";

  const mesesUnicos = [...new Set(dados.map(d => d.mes))].sort().reverse();

  mesesUnicos.forEach(mes => {
    const btn = document.createElement("div");
    btn.className = "mes-btn";

    if (mes === filtroAtual) btn.classList.add("ativo");

    btn.innerText = formatarMesBR(mes);

    btn.onclick = () => {
      filtroAtual = mes;
      render();
    };

    container.appendChild(btn);
  });
}

// RENDER
function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  let entradas = 0;
  let saidas = 0;

  dados
    .filter(item => !filtroAtual || item.mes === filtroAtual)
    .forEach(item => {

      if (item.tipo === "entrada") entradas += item.valor;
      else saidas += item.valor;

      lista.innerHTML += `
        <div class="card">
          <p><b>${item.nome}</b></p>
          <p>R$ ${item.valor.toFixed(2).replace(".", ",")}</p>
          <p>${item.tipo} | ${item.pagamento}</p>
          <p>${formatarMesBR(item.mes)}</p>
          <button onclick='editar("${item.id}", ${JSON.stringify(item)})'>Editar</button>
          <button onclick='excluir("${item.id}")'>Excluir</button>
        </div>
      `;
    });

  document.getElementById("entradas").innerText = entradas.toFixed(2).replace(".", ",");
  document.getElementById("saidas").innerText = saidas.toFixed(2).replace(".", ",");
  document.getElementById("saldo").innerText = (entradas - saidas).toFixed(2).replace(".", ",");

  atualizarGrafico(entradas, saidas);
  renderMeses();
}

// GRÁFICO
function atualizarGrafico(entradas, saidas) {
  const ctx = document.getElementById("grafico");

  if (grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Entradas", "Saídas"],
      datasets: [{
        data: [entradas, saidas],
        backgroundColor: ["green", "red"]
      }]
    }
  });
}
</script>

</body>
</html>
