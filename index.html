<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Financeiro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #1e1b2e;
  color: white;
  margin: 0;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
  color: #b388ff;
}

.card {
  background: #2a2550;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  background: #7c4dff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #651fff;
}

.item {
  background: #3a336f;
  padding: 10px;
  border-radius: 8px;
  margin-top: 8px;
}

.resumo {
  text-align: center;
  margin-top: 10px;
}

small {
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="app">

<h1>💜 Finanças</h1>

<div class="card">
  <input type="text" id="nome" placeholder="Nome (Luz, Mercado...)">
  <input type="number" id="valor" placeholder="Valor">

  <select id="tipo">
    <option value="entrada">Entrada</option>
    <option value="saida">Saída</option>
  </select>

  <select id="pagamento">
    <option>Débito</option>
    <option>Crédito</option>
    <option>Dinheiro</option>
  </select>

  <input type="month" id="mes">

  <button onclick="adicionar()">Salvar</button>
</div>

<div class="card">
  <select id="filtroMes" onchange="render()"></select>
</div>

<div class="card" id="lista"></div>

<div class="card resumo">
  Entradas: R$ <span id="entradas">0</span><br>
  Saídas: R$ <span id="saidas">0</span><br>
  Saldo: R$ <span id="saldo">0</span>
</div>

<div class="card">
  <canvas id="grafico"></canvas>
</div>

</div>

<script>
let dados = JSON.parse(localStorage.getItem("dados")) || [];
let grafico;

// ADICIONAR
function adicionar() {
  const nome = document.getElementById("nome").value;
  const valor = parseFloat(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;
  const pagamento = document.getElementById("pagamento").value;
  const mes = document.getElementById("mes").value;

  if (!nome || !valor || !mes) {
    alert("Preencha tudo!");
    return;
  }

  dados.push({ nome, valor, tipo, pagamento, mes });

  salvar();
  limparCampos();
  atualizarFiltro();
  render();
}

// LIMPAR CAMPOS
function limparCampos() {
  document.getElementById("nome").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("tipo").value = "entrada";
  document.getElementById("pagamento").value = "Débito";
  document.getElementById("mes").value = "";
}

// SALVAR
function salvar() {
  localStorage.setItem("dados", JSON.stringify(dados));
}

// EXCLUIR
function excluir(index) {
  dados.splice(index, 1);
  salvar();
  render();
}

// EDITAR
function editar(index) {
  const item = dados[index];

  document.getElementById("nome").value = item.nome;
  document.getElementById("valor").value = item.valor;
  document.getElementById("tipo").value = item.tipo;
  document.getElementById("pagamento").value = item.pagamento;
  document.getElementById("mes").value = item.mes;

  excluir(index);
}

// FILTRO DE MÊS
function atualizarFiltro() {
  const filtro = document.getElementById("filtroMes");
  const meses = [...new Set(dados.map(d => d.mes))];

  filtro.innerHTML = '<option value="">Todos os meses</option>';

  meses.forEach(m => {
    filtro.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

// RENDER
function render() {
  const lista = document.getElementById("lista");
  const filtroMes = document.getElementById("filtroMes").value;

  lista.innerHTML = "";

  let entradas = 0;
  let saidas = 0;

  dados
    .filter(d => !filtroMes || d.mes === filtroMes)
    .forEach((item, index) => {

      if (item.tipo === "entrada") {
        entradas += item.valor;
      } else {
        saidas += item.valor;
      }

      lista.innerHTML += `
        <div class="item">
          <b>${item.nome}</b> - R$ ${item.valor.toFixed(2)} <br>
          <small>${item.tipo} | ${item.pagamento} | ${item.mes}</small><br>
          <button onclick="editar(${index})">Editar</button>
          <button onclick="excluir(${index})">Excluir</button>
        </div>
      `;
    });

  document.getElementById("entradas").innerText = entradas.toFixed(2);
  document.getElementById("saidas").innerText = saidas.toFixed(2);
  document.getElementById("saldo").innerText = (entradas - saidas).toFixed(2);

  atualizarGrafico(entradas, saidas);
}

// GRÁFICO
function atualizarGrafico(entradas, saidas) {
  const ctx = document.getElementById("grafico");

  if (grafico) grafico.destroy();

  grafico = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Entradas", "Saídas"],
      datasets: [{
        data: [entradas, saidas],
        backgroundColor: ["#00e676", "#ff5252"]
      }]
    }
  });
}

// INIT
atualizarFiltro();
render();
</script>

</body>
</html>
